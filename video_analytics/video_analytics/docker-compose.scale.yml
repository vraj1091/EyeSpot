services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-video_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-video_analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video_analytics} -d ${POSTGRES_DB:-video_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-video_analytics}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-video_analytics}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      CORS_ALLOW_ALL: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      ALLOW_PUBLIC_COMPANY_BOOTSTRAP: "false"
      ENABLE_CAMERA_PROCESSING: "false"
      ENABLE_DISTRIBUTED_WORKERS: "true"
      WORKER_NODE_ID: "api"
      WORKER_NODE_IDS: "worker-a,worker-b,worker-c"
      CAMERA_RECONCILE_INTERVAL_SECONDS: ${CAMERA_RECONCILE_INTERVAL_SECONDS:-15}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  worker-a:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-video_analytics}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-video_analytics}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      CORS_ALLOW_ALL: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      ALLOW_PUBLIC_COMPANY_BOOTSTRAP: "false"
      ENABLE_CAMERA_PROCESSING: "true"
      ENABLE_DISTRIBUTED_WORKERS: "true"
      WORKER_NODE_ID: "worker-a"
      WORKER_NODE_IDS: "worker-a,worker-b,worker-c"
      CAMERA_RECONCILE_INTERVAL_SECONDS: ${CAMERA_RECONCILE_INTERVAL_SECONDS:-15}
    volumes:
      - worker_a_alert_images:/app/alert_images

  worker-b:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-video_analytics}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-video_analytics}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      CORS_ALLOW_ALL: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      ALLOW_PUBLIC_COMPANY_BOOTSTRAP: "false"
      ENABLE_CAMERA_PROCESSING: "true"
      ENABLE_DISTRIBUTED_WORKERS: "true"
      WORKER_NODE_ID: "worker-b"
      WORKER_NODE_IDS: "worker-a,worker-b,worker-c"
      CAMERA_RECONCILE_INTERVAL_SECONDS: ${CAMERA_RECONCILE_INTERVAL_SECONDS:-15}
    volumes:
      - worker_b_alert_images:/app/alert_images

  worker-c:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-video_analytics}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-video_analytics}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      CORS_ALLOW_ALL: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      ALLOW_PUBLIC_COMPANY_BOOTSTRAP: "false"
      ENABLE_CAMERA_PROCESSING: "true"
      ENABLE_DISTRIBUTED_WORKERS: "true"
      WORKER_NODE_ID: "worker-c"
      WORKER_NODE_IDS: "worker-a,worker-b,worker-c"
      CAMERA_RECONCILE_INTERVAL_SECONDS: ${CAMERA_RECONCILE_INTERVAL_SECONDS:-15}
    volumes:
      - worker_c_alert_images:/app/alert_images

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  worker_a_alert_images:
  worker_b_alert_images:
  worker_c_alert_images:

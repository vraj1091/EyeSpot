services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-video_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-video_analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video_analytics} -d ${POSTGRES_DB:-video_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-video_analytics}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-video_analytics}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      CORS_ALLOW_ALL: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      ALLOW_PUBLIC_COMPANY_BOOTSTRAP: "false"
    volumes:
      - backend_alert_images:/app/alert_images
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  backend_alert_images:
